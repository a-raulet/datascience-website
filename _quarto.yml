project:
  type: website
  output-dir: _site
  render:
    - "**/*.qmd"
    - "!test.qmd"
    - "!test.en.qmd"
    - "!test.ja.qmd"

execute:
  freeze: auto
  
website:
  title: "Arnaud RAULET | Intelligence Stratégique Japon"
  description: "Intelligence stratégique Japon — pour les décisions qui comptent"
  navbar:
    background: primary
    search: true
    left:
      - text: "Accueil"
        file: index.qmd
      - text: "Services"
        menu:
          - text: "Vue d'ensemble"
            file: services/index.qmd
          - text: "JapanTechRadar"
            file: services/japan-tech-radar.qmd
          - text: "PricingDiag"
            file: services/pricing-diag.qmd
      - text: "Portfolio"
        file: portfolio/index.qmd
      - text: "Blog"
        file: blog/index.qmd
      - text: "À propos"
        file: about.qmd
    right:
      - icon: github
        href: https://github.com/a-raulet
      - icon: linkedin
        href: https://linkedin.com/in/arnaud-raulet-13308310/
      - text: "🇫🇷"
        href: "/"
      - text: "🇬🇧"
        href: "/index.en.html"
      - text: "🇯🇵"
        href: "/index.ja.html"


format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    code-fold: true
    html-math-method: katex
    include-in-header:
      - text: |
          <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
          <script>
          (function () {
            function detectLang(p) {
              return /\.en\.html$/.test(p) ? 'en' : /\.ja\.html$/.test(p) ? 'ja' : 'fr';
            }
            function toLang(href, lang) {
              if (!href) return href;
              /* Conserve query string et fragment */
              var qi = href.search(/[?#]/);
              var tail = qi !== -1 ? href.slice(qi) : '';
              var body = qi !== -1 ? href.slice(0, qi) : href;
              /* Normalise / en /index pour pouvoir lui ajouter un suffixe de langue */
              if (body.endsWith('/')) body += 'index';
              /* Gère les URLs avec OU sans .html (Netlify sert les deux formes) */
              var hasHtml = /\.html$/.test(body);
              if (hasHtml) body = body.slice(0, -5);
              /* Retire un suffixe de langue existant */
              body = body.replace(/\.(en|ja)$/, '');
              /* Ajoute le suffixe de langue cible */
              if (lang !== 'fr') body += '.' + lang;
              if (hasHtml) body += '.html';
              return body + tail;
            }
            function isFlagEmoji(txt) {
              return /^\uD83C[\uDDE6-\uDDFF]\uD83C[\uDDE6-\uDDFF]$/.test(txt);
            }
            function flagImg(cc, alt) {
              return '<img src="https://flagcdn.com/20x15/' + cc + '.png"'
                + ' alt="' + alt + '" width="20" height="15"'
                + ' style="vertical-align:middle;margin-bottom:2px">';
            }
            /* True si href est une URL externe (autre origin que la page courante).
               Quarto-nav.js peut convertir les hrefs relatifs en URLs absolues
               http://localhost..., d'où la nécessité de check par origin et pas par "://" */
            function isExternalUrl(h) {
              if (!/^https?:\/\//.test(h)) return false;
              try { return new URL(h).origin !== window.location.origin; }
              catch (e) { return true; }
            }
            var path = window.location.pathname;
            /* Netlify pretty URLs: /about, /services/japan-tech-radar, etc.
               Normalise en .html pour que detectLang et base fonctionnent uniformement */
            if (path.endsWith('/')) path += 'index.html';
            else if (!/\.html$/.test(path)) path += '.html';
            var lang = detectLang(path);
            var base = path.replace(/\.(en|ja)\.html$/, '.html');
            var LANGS = [
              { code: 'fr', img: flagImg('fr','FR'), label: 'Français', href: base },
              { code: 'en', img: flagImg('gb','EN'), label: 'English',  href: base.replace(/\.html$/, '.en.html') },
              { code: 'ja', img: flagImg('jp','JA'), label: '日本語',   href: base.replace(/\.html$/, '.ja.html') }
            ];
            var cur = LANGS.find(function(l) { return l.code === lang; }) || LANGS[0];
            /* Note: Quarto applique smart quotes, donc 'Vue d\u2019ensemble' (U+2019) */
            var NAV_LABELS = {
              en: {
                'Accueil': 'Home', 'Services': 'Services',
                'Vue d\u2019ensemble': 'Overview',
                'Portfolio': 'Portfolio', 'Blog': 'Blog', '\u00c0 propos': 'About'
              },
              ja: {
                'Accueil': 'ホーム', 'Services': 'サービス',
                'Vue d\u2019ensemble': '概要',
                'Portfolio': 'ポートフォリオ', 'Blog': 'ブログ', '\u00c0 propos': 'プロフィール'
              }
            };
            document.addEventListener('DOMContentLoaded', function () {
              /* 1. Trouve les nav-items drapeaux par emoji et les remplace par un dropdown */
              var flagItems = [];
              document.querySelectorAll('.navbar .nav-item').forEach(function (li) {
                var a = li.querySelector('a[href]');
                if (!a) return;
                if (isFlagEmoji(a.textContent.trim())) flagItems.push(li);
              });
              if (flagItems.length > 0) {
                var ul = flagItems[0].parentNode;
                var items = LANGS.map(function(l) {
                  return '<li><a class="dropdown-item' + (l.code === lang ? ' active' : '') +
                    '" href="' + l.href + '">' + l.img + '\u00a0' + l.label + '</a></li>';
                }).join('');
                var dd = document.createElement('li');
                dd.id = 'lang-switcher';
                dd.className = 'nav-item dropdown';
                dd.innerHTML =
                  '<a class="nav-link dropdown-toggle" href="#" role="button"' +
                  ' data-bs-toggle="dropdown" aria-expanded="false">' + cur.img + '</a>' +
                  '<ul class="dropdown-menu dropdown-menu-end">' + items + '</ul>';
                ul.insertBefore(dd, flagItems[0]);
                flagItems.forEach(function(li) { ul.removeChild(li); });
              }
              /* 2. Traduit les spans menu-text et dropdown-text pour les pages non-FR */
              if (lang !== 'fr') {
                var labels = NAV_LABELS[lang] || {};
                document.querySelectorAll('.navbar .menu-text, .navbar .dropdown-text').forEach(function(el) {
                  if (el.closest('#lang-switcher')) return;
                  var txt = el.textContent.trim();
                  if (labels[txt]) el.textContent = labels[txt];
                });
              }
              /* 3. Réécrit les hrefs navbar pour pointer vers la version courante de la langue */
              if (lang !== 'fr') {
                document.querySelectorAll('.navbar a[href]').forEach(function(a) {
                  if (a.closest('#lang-switcher')) return;
                  var h = a.getAttribute('href') || '';
                  if (!h || h.charAt(0) === '#') return;
                  if (/^(mailto:|tel:|javascript:)/.test(h)) return;
                  if (isExternalUrl(h)) return;
                  var t = toLang(h, lang);
                  if (t !== h) a.setAttribute('href', t);
                });
              }
            });
          })();
          </script>

babelquarto:
  mainlanguage: 'fr'
  languages: ['en', 'ja']
  languagecodes:
    - name: fr
      text: "🇫🇷 Français"
    - name: en
      text: "🇬🇧 English"
    - name: ja
      text: "🇯🇵 日本語"
  languagelinks: navbar
  language-path: "prefix"

title-en: "Arnaud RAULET | Japan Strategic Intelligence"
title-ja: "ローレ・アルノ | 日本戦略インテリジェンス"
description-en: "Japan strategic intelligence — for decisions that matter"
description-ja: "日本の戦略的インテリジェンス — 重要な意思決定のために"
