project:
  type: website
  output-dir: _site
  render:
    - "**/*.qmd"
    - "!test.qmd"
    - "!test.en.qmd"
    - "!test.ja.qmd"

execute:
  freeze: auto

website:
  title: "Arnaud RAULET | Intelligence Stratégique Japon"
  description: "Intelligence stratégique Japon — pour les décisions qui comptent"
  navbar:
    background: primary
    search: true
    left:
      - text: "Accueil"
        file: index.qmd
      - text: "Services"
        menu:
          - text: "Vue d'ensemble"
            file: services/index.qmd
          - text: "JapanTechRadar"
            file: services/japan-tech-radar.qmd
          - text: "PricingDiag"
            file: services/pricing-diag.qmd
      - text: "Portfolio"
        file: portfolio/index.qmd
      - text: "Blog"
        file: blog/index.qmd
      - text: "À propos"
        file: about.qmd
    right:
      - icon: github
        href: https://github.com/a-raulet
      - icon: linkedin
        href: https://linkedin.com/in/arnaud-raulet-13308310/
      - text: "🇫🇷"
        href: "/"
      - text: "🇬🇧"
        href: "/index.en.html"
      - text: "🇯🇵"
        href: "/index.ja.html"


format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    code-fold: true
    html-math-method: katex
    include-in-header:
      - file: _includes/umami.html
      - file: _includes/plotly.html
      - file: _includes/nav-i18n.html

babelquarto:
  mainlanguage: 'fr'
  languages: ['en', 'ja']
  languagecodes:
    - name: fr
      text: "🇫🇷 Français"
    - name: en
      text: "🇬🇧 English"
    - name: ja
      text: "🇯🇵 日本語"
  languagelinks: navbar
  language-path: "prefix"

title-en: "Arnaud RAULET | Japan Strategic Intelligence"
title-ja: "ローレ・アルノ | 日本戦略インテリジェンス"
description-en: "Japan strategic intelligence — for decisions that matter"
description-ja: "日本の戦略的インテリジェンス — 重要な意思決定のために"
author-en: "Arnaud RAULET"
author-ja: "ローレ・アルノ"

lang: fr
